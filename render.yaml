services:
  # Backend API Service
  - type: web
    name: pharmacy-revenue-backend
    env: python
    plan: free
    buildCommand: cd BABL-WORK/backend && pip install -r requirements.txt
    startCommand: cd BABL-WORK/backend && gunicorn app.main_complete:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 300 --graceful-timeout 30
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
    autoDeploy: true

  # Frontend Service - Static Site (Free Tier)
  - type: static
    name: pharmacy-revenue-frontend
    buildCommand: cd BABL-WORK/frontend && npm install && npm run build && (cp public/_redirects build/_redirects 2>/dev/null || echo '/*    /index.html   200' > build/_redirects)
    publishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: pharmacy-revenue-backend
          property: host
      - key: NODE_VERSION
        value: 18.20.0
    autoDeploy: true
